# ============================================================
# Complete Evo-Framework configuration template
# ============================================================
#
# Usage:
#   python -m evoskill.main --config demo/example/config.yaml --skill demo/example
#
# Priority: environment variables > .env file > this YAML > Pydantic defaults
# Example: if this file sets model: gpt-4o but EVO_LLM_MODEL=xxx is set, the env var wins
#
# Every field has a default value, so only change what you need.
# ============================================================


# ─────────────────────────────────────────────
# LLM connection settings
# ─────────────────────────────────────────────
llm:
  # API key (required, otherwise requests cannot be made)
  api_key: "your-api-key-here"

  # API base URL (OpenAI-compatible format)
  # Common options:
  #   OpenAI:       https://api.openai.com/v1
  #   SiliconFlow:  https://api.siliconflow.cn/v1
  #   Local Ollama: http://localhost:11434/v1
  base_url: "https://api.siliconflow.cn/v1"

  # Chat model used for normal generation
  model: "Qwen/Qwen2.5-14B-Instruct"

  # Judge model used for APO gradient analysis and prompt rewrites
  # A stronger model is recommended; it may be the same as model
  judge_model: "Qwen/Qwen2.5-14B-Instruct"

  # Generation temperature (0.0 ~ 2.0)
  # Lower is more deterministic, higher is more random
  temperature: 0.7


# ─────────────────────────────────────────────
# Storage settings
# ─────────────────────────────────────────────
storage:
  # Storage path for interaction history (Trace)
  # Each conversation appends a record to this JSONL file
  trace_path: "./data/traces.jsonl"

  # Default search path for Skill files
  # When --skill is a name instead of a path, this directory is searched
  skill_path: "./skills"


# ─────────────────────────────────────────────
# APO optimization parameters
# ─────────────────────────────────────────────
apo:
  # Maximum optimization steps (reserved; currently single-step)
  max_steps: 3

  # Number of feedback samples used in each optimization
  # Larger values are more stable but require more API calls
  gradient_accumulation_steps: 5


# ─────────────────────────────────────────────
# Reward / automatic Judge settings
# ─────────────────────────────────────────────
reward:
  # Whether to enable the automatic Judge
  # false = feedback only through /bad and /rewrite
  # true  = enables /judge and the auto_judge option
  enabled: false

  # Whether to run Judge scoring automatically after each generation
  # Tune the rubric manually first to avoid wasting API calls
  auto_judge: false

  # Dedicated Judge model (empty = use llm.judge_model)
  # Set this if you want to score with a different model
  model: null

  # Dedicated Judge API base URL (empty = use llm.base_url)
  base_url: null

  # Dedicated Judge API key (empty = use llm.api_key)
  api_key: null

  # Default scoring rubric prompt
  # A skill-level config.judge_rubric overrides this value
  # Leave empty to use the framework's built-in generic scoring logic
  default_rubric: |
    You are an expert evaluator of writing quality. Score the agent's reply from 0 to 1 along the following dimensions and provide a concrete analysis:

    1. Naturalness (weight 0.3): does it sound human, or does it sound AI-generated?
    2. Accuracy (weight 0.3): does it address the request without drifting off-topic?
    3. Style (weight 0.2): does the writing style fit the scenario?
    4. Practicality (weight 0.2): can the user use it directly?

    Output format:
    Score: <decimal between 0 and 1>
    Analysis: <specific analysis>


# ─────────────────────────────────────────────
# Global options
# ─────────────────────────────────────────────

# Debug mode (prints verbose logs)
verbose: false
